# ============================================================
# DOCKER COMPOSE — Base de Dados PostgreSQL
# ============================================================
# O QUE FAZER AQUI:
# Este ficheiro já está configurado para criar uma base de dados
# PostgreSQL usando Docker. Só precisas de:
#
# 1. Ter o Docker Desktop instalado e a correr
# 2. No terminal, dentro da pasta "backend", correr:
#    docker-compose up -d
# 3. Isto cria um container com PostgreSQL pronto a usar
#
# CREDENCIAIS (para desenvolvimento local):
# - Host: localhost
# - Porta: 5432
# - Base de dados: notificacoes_db
# - Utilizador: postgres
# - Password: postgres123
# ============================================================

version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: notificacoes_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: notificacoes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
